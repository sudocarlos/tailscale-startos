name: Bump Upstream Version

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  bump:
    name: Create version bump PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - uses: actions/checkout@v4

      - name: Detect new stable version
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const https = require('https');

            function get(url, headers = {}) {
              return new Promise((resolve, reject) => {
                https.get(url, { headers }, (res) => {
                  let data = '';
                  res.on('data', chunk => data += chunk);
                  res.on('end', () => resolve({ status: res.statusCode, headers: res.headers, body: data }));
                }).on('error', reject);
              });
            }

            function head(url, headers = {}) {
              return new Promise((resolve, reject) => {
                const opts = { method: 'HEAD', headers, ...require('url').parse(url) };
                https.request(opts, (res) => {
                  res.resume();
                  resolve({ status: res.statusCode, headers: res.headers });
                }).on('error', reject).end();
              });
            }

            // 1. Get GHCR anonymous token
            const tokenRes = await get(
              'https://ghcr.io/token?scope=repository:tailscale/tailscale:pull&service=ghcr.io'
            );
            const { token } = JSON.parse(tokenRes.body);
            const authHeader = `Bearer ${token}`;
            const manifestAccept = [
              'application/vnd.oci.image.index.v1+json',
              'application/vnd.docker.distribution.manifest.list.v2+json',
            ].join(',');

            // 2. Get the digest of the current "stable" tag
            const stableHead = await head(
              'https://ghcr.io/v2/tailscale/tailscale/manifests/stable',
              { Authorization: authHeader, Accept: manifestAccept }
            );
            const stableDigest = stableHead.headers['docker-content-digest'];
            if (!stableDigest) {
              core.setFailed('Could not retrieve digest for tailscale:stable');
              return;
            }
            core.info(`stable digest: ${stableDigest}`);

            // 3. Fetch full tag list (paginated) and find the versioned tag sharing the same digest
            let allTags = [];
            let tagsUrl = 'https://ghcr.io/v2/tailscale/tailscale/tags/list';
            while (tagsUrl) {
              const tagsRes = await get(tagsUrl, { Authorization: authHeader });
              const { tags } = JSON.parse(tagsRes.body);
              allTags = allTags.concat(tags || []);
              const link = tagsRes.headers['link'];
              if (link) {
                const match = link.match(/<([^>]+)>;\s*rel="next"/);
                if (match) {
                  const rel = match[1];
                  tagsUrl = rel.startsWith('http') ? rel : `https://ghcr.io${rel}`;
                } else {
                  tagsUrl = null;
                }
              } else {
                tagsUrl = null;
              }
            }

            const versionTags = allTags
              .filter(t => /^v\d+\.\d+\.\d+$/.test(t))
              .sort((a, b) => {
                const pa = a.slice(1).split('.').map(Number);
                const pb = b.slice(1).split('.').map(Number);
                for (let i = 0; i < 3; i++) if (pa[i] !== pb[i]) return pb[i] - pa[i];
                return 0;
              });
            core.info(`Checking ${versionTags.length} versioned tags, starting from ${versionTags[0]}…`);

            let stableVersion = null;
            for (const tag of versionTags) {  // newest first
              const res = await head(
                `https://ghcr.io/v2/tailscale/tailscale/manifests/${tag}`,
                { Authorization: authHeader, Accept: manifestAccept }
              );
              if (res.headers['docker-content-digest'] === stableDigest) {
                stableVersion = tag;
                break;
              }
            }

            if (!stableVersion) {
              core.setFailed('Could not match stable digest to any versioned tag');
              return;
            }
            core.info(`stable version resolved to: ${stableVersion}`);

            // 4. Read current pinned version from manifest
            const fs = require('fs');
            const manifestPath = 'startos/manifest/index.ts';
            const manifestContent = fs.readFileSync(manifestPath, 'utf8');
            const dockerTagMatch = manifestContent.match(/dockerTag:\s*'([^']+)'/);
            if (!dockerTagMatch) {
              core.setFailed('Could not parse dockerTag from manifest');
              return;
            }
            const currentTag = dockerTagMatch[1];
            const currentVersion = currentTag.replace(/^ghcr\.io\/tailscale\/tailscale:v/, '');
            const stableVersionClean = stableVersion.replace(/^v/, '');

            core.info(`current: v${currentVersion}, stable: v${stableVersionClean}`);

            if (currentVersion === stableVersionClean) {
              core.info(`Already at v${stableVersionClean} — no update needed.`);
              core.setOutput('skip', 'true');
              return;
            }

            core.info(`New version detected: v${currentVersion} → v${stableVersionClean}`);
            core.setOutput('skip', 'false');
            core.setOutput('stable_version', stableVersionClean);
            core.setOutput('current_version', currentVersion);
            core.setOutput('stable_digest', stableDigest);

      - name: Check for existing bump PR
        id: check_pr
        if: steps.detect.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.detect.outputs.stable_version }}';
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `feat/bump-tailscale-v${version}`,
            });
            if (prs.length > 0) {
              core.info(`PR already exists for v${version}: #${prs[0].number}`);
              core.setOutput('skip', 'true');
            } else {
              core.setOutput('skip', 'false');
            }

      - name: Configure git and create branch
        if: steps.detect.outputs.skip != 'true' && steps.check_pr.outputs.skip != 'true'
        run: |
          BRANCH="feat/bump-tailscale-v${{ steps.detect.outputs.stable_version }}"
          # Remove stale local/remote branch references if they exist
          git branch -D "$BRANCH" 2>/dev/null || true
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b "$BRANCH"

      - name: Run bump-version.sh
        if: steps.detect.outputs.skip != 'true' && steps.check_pr.outputs.skip != 'true'
        run: |
          bash scripts/bump-version.sh "${{ steps.detect.outputs.stable_version }}"

      - name: Update version references in README.md
        if: steps.detect.outputs.skip != 'true' && steps.check_pr.outputs.skip != 'true'
        env:
          OLD_VER: ${{ steps.detect.outputs.current_version }}
          NEW_VER: ${{ steps.detect.outputs.stable_version }}
        run: |
          python3 <<'PYEOF'
          import os
          old_ver = os.environ['OLD_VER']
          new_ver = os.environ['NEW_VER']
          with open('README.md') as f:
              content = f.read()
          count = content.count(f'v{old_ver}')
          content = content.replace(f'v{old_ver}', f'v{new_ver}')
          with open('README.md', 'w') as f:
              f.write(content)
          print(f'Updated {count} reference(s) in README.md from v{old_ver} to v{new_ver}')
          PYEOF

      - name: Commit and push
        if: steps.detect.outputs.skip != 'true' && steps.check_pr.outputs.skip != 'true'
        run: |
          git add -A
          git commit -m "feat: bump Tailscale to v${{ steps.detect.outputs.stable_version }}"
          git push origin "feat/bump-tailscale-v${{ steps.detect.outputs.stable_version }}"

      - name: Create Pull Request
        if: steps.detect.outputs.skip != 'true' && steps.check_pr.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.detect.outputs.stable_version }}';
            const currentVersion = '${{ steps.detect.outputs.current_version }}';
            const digest = '${{ steps.detect.outputs.stable_digest }}';

            const body = [
              `A new stable release of **tailscale/tailscale** has been published on GHCR.`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| Version | \`v${version}\` |`,
              `| Previous | \`v${currentVersion}\` |`,
              `| GHCR tag | \`ghcr.io/tailscale/tailscale:stable\` |`,
              `| Digest | \`${digest}\` |`,
              ``,
              `### Links`,
              ``,
              `- [GHCR package](https://github.com/tailscale/tailscale/pkgs/container/tailscale)`,
              `- [GitHub Release](https://github.com/tailscale/tailscale/releases/tag/v${version})`,
              `- [Changelog](https://tailscale.com/changelog)`,
              ``,
              `### Changes in this PR`,
              ``,
              `- Bump \`dockerTag\` in \`startos/manifest/index.ts\` to \`ghcr.io/tailscale/tailscale:v${version}\``,
              `- Add \`startos/versions/v${version}.0.ts\` with placeholder release notes`,
              `- Update \`startos/versions/index.ts\` to set \`v${version}.0\` as current and move \`v${currentVersion}.0\` to \`other\``,
              `- Update version references in \`README.md\``,
              ``,
              `> **Note:** This PR was created automatically by the \`bump-upstream.yml\` workflow.`,
              `> Please review the changes, fill in the release notes placeholder in \`startos/versions/v${version}.0.ts\``,
              `> with highlights from the [changelog](https://tailscale.com/changelog), and verify the build before merging.`,
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `feat: bump Tailscale to v${version}`,
              body,
              head: `feat/bump-tailscale-v${version}`,
              base: 'main',
            });

            core.info(`Created PR #${pr.number}: ${pr.html_url}`);
