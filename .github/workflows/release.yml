name: Build and Upload Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name of the release to build and upload (e.g. v1.98.4-0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }} package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            make_target: x86
          - arch: aarch64
            make_target: arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y squashfs-tools squashfs-tools-ng

      - name: Install start-cli
        run: |
          START_CLI_VERSION=v0.4.0-beta.9
          curl -fsSL "https://github.com/Start9Labs/start-os/releases/download/${START_CLI_VERSION}/start-cli_x86_64-linux" -o /usr/local/bin/start-cli
          chmod +x /usr/local/bin/start-cli

      - name: Initialize developer key
        run: start-cli init-key

      - name: Install dependencies
        run: npm ci

      - name: Build JavaScript
        run: npm run build

      - name: Build ${{ matrix.arch }} package
        run: make ${{ matrix.make_target }}

      - name: Upload ${{ matrix.arch }} package to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: gh release upload "$TAG" tailscale_${{ matrix.arch }}.s9pk --clobber
